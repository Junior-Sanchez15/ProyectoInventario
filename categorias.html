<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Categorías</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

    <header>
        <h1>Registro de Categorías</h1>
    </header>

   <!-- Boton menu -->
<div class="menu-toggle" onclick="toggleMenu()">
    ☰
</div>

<!-- Sidebar -->
<div class="sidebar" id="sidebar">

    <h2>Sistema</h2>

    <a href="index.html">Inicio</a>
    <a href="categorias.html">Categorías</a>
    <a href="productos.html">Productos</a>
    <a href="ventas.html">Ventas</a>
    <a href="inventario.html">Inventario</a>

    
</div>

    <main>
        <form id="formCategoria" class="formulario">

    <label>Nombre de la Categoría</label>

    <input
        id="nombreCategoria"
        type="text"
        placeholder="Ingrese el nombre de la categoría">

    <label>Descripción</label>

    <textarea
        id="descripcionCategoria"
        placeholder="Ingrese una descripción"></textarea>

    <button type="submit">

        <i class="fa-solid fa-floppy-disk"></i>

        Guardar Categoría

    </button>
    
     <!-- Mensajes dinámicos -->
    <div id="mensajeCategoria"></div>

</form>

<!-- Tabla de categorías -->
<section class="tabla-productos">

    <h2>Categorías Registradas</h2>

    <table>

        <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Descripción</th>
                <th>Acciones</th>
            </tr>
        </thead>

        <tbody id="tablaCategorias">
        </tbody>

    </table>

</section>

<section class="actividad">

    <h2>Actividad Reciente</h2>

    <ul id="listaActividad"></ul>

</section>

    </main>

    <footer>

    <p>© 2026 Sistema de Inventario</p>

    <p>contacto@inventario.com</p>

</footer>

<script src="js/menu.js"></script>
<script src="js/escudo.js"></script>
<script src="js/actividad.js"></script>
<script src="js/categorias.js"></script>

</body>

</html>
