<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ventas - Sistema de Inventario</title>

    <link rel="stylesheet" href="css/style.css">

    <!-- ICONOS -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

    <header>
        <h1><i class="fa-solid fa-cart-shopping"></i> Registrar Venta</h1>
    </header>

    <!-- Menu -->
    <div class="menu-toggle" onclick="toggleMenu()">
        <i class="fa-solid fa-bars"></i>
    </div>

    <div class="sidebar" id="sidebar">
        <h2>Sistema</h2>
        <a href="index.html"><i class="fa-solid fa-house"></i> Inicio</a>
        <a href="categorias.html"><i class="fa-solid fa-tags"></i> Categorías</a>
        <a href="productos.html"><i class="fa-solid fa-box-open"></i> Productos</a>
        <a href="ventas.html" class="active"><i class="fa-solid fa-cart-shopping"></i> Ventas</a>
        <a href="inventario.html"><i class="fa-solid fa-clipboard-list"></i> Inventario</a>
    </div>

    <!-- Sidebar Overlay -->
    <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleMenu()"></div>

    <section class="hero hero-ventas">
        <h2>Punto de Venta</h2>
        <p>Selecciona un producto disponible y realiza la transacción</p>
    </section>

    <main>
        <section>
            <form id="formVenta" class="formulario">

                <label for="productoVenta">Producto</label>
                <select id="productoVenta"></select>

                <label for="cantidadVenta">Cantidad</label>
                <input type="number" id="cantidadVenta" placeholder="Cantidad a vender" min="1">

                <label for="precioProducto">Precio Unitario</label>
                <input type="text" id="precioProducto" readonly style="background: #e5e7eb; cursor: not-allowed;">
                
                <label for="totalVenta">Total a Pagar</label>
                <input type="text" id="totalVenta" readonly style="background: rgba(16, 185, 129, 0.1); color: var(--secondary-color); font-weight: bold; font-size: 1.2rem;">
                
                <button type="submit" id="btnVender">
                    <i class="fa-solid fa-cart-arrow-down"></i>
                    Completar Venta
                </button>
            </form>
        </section>

        <section class="actividad">
            <h2><i class="fa-solid fa-bolt"></i> Actividad Reciente</h2>
            <ul id="listaActividad">
                <!-- Dinámico -->
            </ul>
        </section>
    </main>

    <footer>
        <p>© 2026 Sistema de Inventario</p>
        <p>contacto@inventario.com</p>
    </footer>

    <!-- Scripts -->
    <script src="js/storage.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/menu.js"></script>
    <script src="js/actividad.js"></script>
    <script src="js/ventas.js"></script>

</body>
</html>
